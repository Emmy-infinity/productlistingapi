services:
  - type: web
    name: django-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn your_project_name.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0 # Match your local version
      - key: DATABASE_URL
        fromDatabase:
          name: pg-database
          property: connectionString

databases:
  - name: pg-database
    plan: free # Change to starter for production
